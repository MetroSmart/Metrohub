services:

  db:
    image: postgres:16
    container_name: metrosmart_db
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    networks:
      - metrosmart_net

  redis:
    image: redis:7-alpine
    container_name: metrosmart_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - metrosmart_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: metrosmart_backend
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    networks:
      - metrosmart_net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: metrosmart_frontend
    restart: always
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - metrosmart_net

volumes:
  postgres_data:

networks:
  metrosmart_net:
    driver: bridge
